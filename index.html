<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria Elyon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Pizzaria Elyon 🍕</h1>
        <nav>
            <ul>
                <li><a href="#menu">Menu</a></li>
                <li><a href="#carrinho">Carrinho</a></li>
                <li><a href="#pedido">Pedido</a></li>
            </ul>
        </nav>
    </header>

    <section id="menu">
        <h2>Nosso Cardápio</h2>
        <div class="pizzas">
            <div class="pizza">
                <h3>Margherita - R$25</h3>
                <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..." alt="Margherita">
                <button onclick="adicionarCarrinho('Margherita', 25)">Adicionar ao Carrinho</button>
            </div>
            <div class="pizza">
                <h3>Calabresa - R$30</h3>
                <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..." alt="Calabresa">
                <button onclick="adicionarCarrinho('Calabresa', 30)">Adicionar ao Carrinho</button>
            </div>
            <div class="pizza">
                <h3>Frango com Catupiry - R$35</h3>
                <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..." alt="Frango">
                <button onclick="adicionarCarrinho('Frango com Catupiry', 35)">Adicionar ao Carrinho</button>
            </div>
        </div>
    </section>

    <section id="carrinho">
        <h2>Seu Carrinho</h2>
        <ul id="listaCarrinho"></ul>
        <p>Total: R$<span id="total">0</span></p>
        <button onclick="finalizarCompra()">Finalizar Compra</button>
    </section>

    <section id="pedido">
        <h2>Formulário de Pedido</h2>
        <form id="formPedido">
            <input type="text" placeholder="Nome" required>
            <input type="text" placeholder="Endereço" required>
            <input type="tel" placeholder="Telefone" required>
            <button type="submit">Enviar Pedido</button>
        </form>
    </section>

    <footer>
        <p>© 2026 Pizzaria Elyon. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
